<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="utf-8"/>
  <meta content="width=device-width, initial-scale=1.0, viewport-fit=cover" name="viewport"/>
  <meta content="ie=edge" http-equiv="x-ua-compatible"/>
  <title>3D Gaussian Splat Demo - Phoenix_Royal_Yellow</title>
  <script src="js/util.js" type="text/javascript"></script>
  <script type="importmap">
    {
      "imports": {
        "three": "./lib/three.module.js",
        "@mkkellogg/gaussian-splats-3d": "./lib/gaussian-splats-3d.module.js"
      }
    }
  </script>
  <!-- Model Viewer loaded early so it's ready -->
  <script src="https://ajax.googleapis.com/ajax/libs/model-viewer/4.0.0/model-viewer.min.js" type="module"></script>
  <link href="https://fonts.googleapis.com/css2?family=DM+Sans:wght@300;400;500;600;700&family=Playfair+Display:ital,wght@0,400;0,500;1,400&display=swap" rel="stylesheet"/>
  <style>
    /* ══════════════════════════════════════════
       THEME VARIABLES
       ══════════════════════════════════════════ */
    :root, [data-theme="dark"] {
      --bg: #111111; --bg-panel: rgba(0,0,0,0.88); --bg-glass: rgba(255,255,255,0.06);
      --border: rgba(255,255,255,0.12); --text-hi: rgba(255,255,255,0.92);
      --text-lo: rgba(255,255,255,0.42); --btn-bg: #ffffff; --btn-fg: #111111;
      --btn-glow: rgba(255,255,255,0.18); --loader-track: rgba(255,255,255,0.10);
      --loader-head: #ffffff; --overlay-bg: #111111;
      --toggle-bg: rgba(255,255,255,0.09); --toggle-icon: rgba(255,255,255,0.65);
    }
    [data-theme="light"] {
      --bg: #f4f4f2; --bg-panel: rgba(244,244,242,0.92); --bg-glass: rgba(0,0,0,0.05);
      --border: rgba(0,0,0,0.10); --text-hi: rgba(0,0,0,0.88);
      --text-lo: rgba(0,0,0,0.38); --btn-bg: #111111; --btn-fg: #ffffff;
      --btn-glow: rgba(0,0,0,0.14); --loader-track: rgba(0,0,0,0.08);
      --loader-head: #111111; --overlay-bg: #f4f4f2;
      --toggle-bg: rgba(0,0,0,0.07); --toggle-icon: rgba(0,0,0,0.55);
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body { background-color: var(--bg); height: 100dvh; overflow: hidden;
      font-family: 'DM Sans', sans-serif; transition: background-color 0.35s ease; }

    /* ══════════════════════════════════════════
       LOADING OVERLAY
       ══════════════════════════════════════════ */
    #loadingOverlay {
      position: fixed; inset: 0; background: var(--overlay-bg);
      display: flex; flex-direction: column; align-items: center; justify-content: center;
      gap: 18px; z-index: 200; transition: opacity 0.5s ease, visibility 0.5s ease;
    }
    #loadingOverlay.hidden { opacity: 0; visibility: hidden; pointer-events: none; }
    .loader-wrap { position: relative; width: 52px; height: 52px; }
    .loader-track { position: absolute; inset: 0; border-radius: 50%; border: 1.5px solid var(--loader-track); }
    .loader-arc { position: absolute; inset: 0; border-radius: 50%;
      border: 1.5px solid transparent; border-top-color: var(--loader-head);
      animation: spin 0.85s linear infinite; }
    .loader-dot { position: absolute; inset: 0; display: flex; align-items: center; justify-content: center; }
    .loader-dot::after { content: ''; width: 5px; height: 5px; border-radius: 50%;
      background: var(--loader-head); opacity: 0.45; animation: pulse 1.4s ease-in-out infinite; }
    .loader-label { font-size: 11px; letter-spacing: 0.22em; text-transform: uppercase;
      color: var(--text-lo); font-weight: 500; }
    .loader-bar-wrap { width: 120px; height: 1px; background: var(--loader-track);
      border-radius: 1px; overflow: hidden; }
    .loader-bar-fill { height: 100%; width: 0%; background: var(--loader-head);
      border-radius: 1px; animation: barFill 6s ease-out forwards; }

    /* ══════════════════════════════════════════
       THEME TOGGLE
       ══════════════════════════════════════════ */
    #themeToggle {
      position: fixed; top: 18px; left: 18px; width: 40px; height: 40px;
      border-radius: 50%; border: 1px solid var(--border); background: var(--toggle-bg);
      backdrop-filter: blur(12px); -webkit-backdrop-filter: blur(12px);
      cursor: pointer; display: flex; align-items: center; justify-content: center;
      z-index: 10; transition: background 0.3s, border-color 0.3s, transform 0.18s;
      -webkit-tap-highlight-color: transparent;
    }
    #themeToggle:hover { transform: scale(1.09); }
    #themeToggle:active { transform: scale(0.93); }
    #themeToggle svg { color: var(--toggle-icon); transition: color 0.3s; }
    [data-theme="dark"]  #iconSun  { display: none; }
    [data-theme="dark"]  #iconMoon { display: block; }
    [data-theme="light"] #iconSun  { display: block; }
    [data-theme="light"] #iconMoon { display: none; }

    /* ══════════════════════════════════════════
       INFO LABEL
       ══════════════════════════════════════════ */
    #infoLabel {
      position: fixed; top: 18px; left: 50%; transform: translateX(-50%);
      display: flex; align-items: center; gap: 7px; background: var(--bg-glass);
      backdrop-filter: blur(16px) saturate(1.3); -webkit-backdrop-filter: blur(16px) saturate(1.3);
      border: 1px solid var(--border); color: var(--text-hi);
      padding: 9px 16px; border-radius: 40px;
      font-size: 12.5px; font-weight: 400; letter-spacing: 0.025em;
      z-index: 10; white-space: nowrap;
      animation: fadeDown 0.65s cubic-bezier(0.22,1,0.36,1) both;
      transition: background 0.3s, border-color 0.3s, color 0.3s;
    }
    #infoLabel svg { opacity: 0.55; flex-shrink: 0; }
    .dot-sep { width: 3px; height: 3px; border-radius: 50%; background: var(--text-lo); flex-shrink: 0; }

    /* ══════════════════════════════════════════
       BOTTOM PANEL + AR BUTTON
       ══════════════════════════════════════════ */
    #bottomPanel {
      position: fixed; bottom: 0; left: 0; right: 0;
      padding: 32px 24px calc(24px + env(safe-area-inset-bottom));
      background: linear-gradient(to top, var(--bg-panel) 55%, transparent);
      display: flex; flex-direction: column; align-items: center; gap: 10px;
      z-index: 10; animation: fadeUp 0.75s 0.15s cubic-bezier(0.22,1,0.36,1) both;
      transition: background 0.35s;
    }
    #viewButton {
      display: flex; align-items: center; justify-content: center; gap: 9px;
      width: 100%; max-width: 320px; background: var(--btn-bg); color: var(--btn-fg);
      font-family: 'DM Sans', sans-serif; font-size: 14.5px; font-weight: 600;
      letter-spacing: 0.02em; padding: 15px 28px; border: none; border-radius: 14px;
      cursor: pointer; position: relative; overflow: hidden;
      box-shadow: 0 6px 28px var(--btn-glow), 0 1px 4px rgba(0,0,0,0.15);
      transition: background 0.3s, color 0.3s, box-shadow 0.3s, transform 0.16s ease;
      -webkit-tap-highlight-color: transparent;
    }
    #viewButton::after {
      content: ''; position: absolute; top: 0; left: -120%; width: 60%; height: 100%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.15), transparent);
      transform: skewX(-18deg); transition: left 0.5s ease;
    }
    #viewButton:hover::after { left: 170%; }
    #viewButton:hover { transform: translateY(-2px); box-shadow: 0 10px 36px var(--btn-glow), 0 2px 8px rgba(0,0,0,0.15); }
    #viewButton:active { transform: scale(0.97); }
    #viewButton svg { flex-shrink: 0; }

    /* ══════════════════════════════════════════
       MODEL-VIEWER — CRITICAL POSITIONING
       
       ⚠️  THE #1 REASON HOTSPOTS DON'T SHOW IN AR:
       model-viewer MUST be rendered on-page with real 
       dimensions. If it's 0×0, display:none, or opacity:0,
       WebXR cannot start and hotspots won't render.
       
       Solution: Place it full-screen behind the Gaussian 
       splat canvas, so it's technically "visible" and sized,
       but visually hidden behind the splat layer.
       ══════════════════════════════════════════ */
    #ar-model-viewer {
      position: fixed;
      inset: 0;
      width: 100%;
      height: 100%;
      z-index: 1;          /* Behind everything else */
      background: transparent;
      /* DO NOT set display:none, opacity:0, or width/height:0 */
    }

    /* The Gaussian Splat canvas sits on top, covering model-viewer */
    #splat-container {
      position: fixed;
      inset: 0;
      z-index: 2;          /* Above model-viewer, below UI */
      pointer-events: auto;
    }
    /* model-viewer's default canvas gets pointer-events only when needed */
    #ar-model-viewer::part(default-progress-bar) { display: none; }

    /* ══════════════════════════════════════════
       DIMENSION HOTSPOT STYLES
       (These render both in-browser AND in WebXR AR)
       ══════════════════════════════════════════ */
    #ar-model-viewer .dim-hotspot {
      background: rgba(255, 255, 255, 0.92);
      border-radius: 20px;
      border: none;
      padding: 4px 10px;
      font-family: 'DM Sans', sans-serif;
      font-weight: 700;
      font-size: 12px;
      color: #111;
      box-shadow: 0 2px 8px rgba(0,0,0,0.3);
      display: block;
      pointer-events: none;
      white-space: nowrap;
      line-height: 1.3;
      --min-hotspot-opacity: 0;
    }

    /* SVG dimension lines overlay */
    #ar-model-viewer svg.dim-lines {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      pointer-events: none;
      overflow: visible;
    }
    #ar-model-viewer svg.dim-lines line {
      stroke: rgba(255,255,255,0.85);
      stroke-width: 1.2;
      stroke-dasharray: 4 3;
    }

    /* Hide model-viewer's default AR button (we have our own) */
    #ar-model-viewer::part(default-ar-button) { display: none; }

    /* ══════════════════════════════════════════
       KEYFRAMES
       ══════════════════════════════════════════ */
    @keyframes spin    { to { transform: rotate(360deg); } }
    @keyframes pulse   { 0%,100% { opacity:.45; transform:scale(1); } 50% { opacity:1; transform:scale(1.55); } }
    @keyframes barFill { to { width: 88%; } }
    @keyframes fadeDown {
      from { opacity:0; transform: translateX(-50%) translateY(-10px); }
      to   { opacity:1; transform: translateX(-50%) translateY(0); }
    }
    @keyframes fadeUp {
      from { opacity:0; transform: translateY(16px); }
      to   { opacity:1; transform: translateY(0); }
    }
  </style>
</head>
<body>

  <!-- ══════════════════════════════════════════════════════════
       MODEL-VIEWER (rendered full-screen, behind splat canvas)
       
       ✅ ar-modes="webxr" — keeps AR inside the browser
       ✅ Full-size on page — WebXR can initialize
       ✅ Hotspots defined with data-position — works in WebXR AR
       ✅ HTTPS required for WebXR to function
       ══════════════════════════════════════════════════════════ -->
  <model-viewer
    id="ar-model-viewer"
    src="https://metashop-italica.s3.eu-north-1.amazonaws.com/Italica/batch2/phoenix.glb"
    ar
    ar-modes="webxr"
    ar-scale="auto"
    camera-controls
    interaction-prompt="none"
    xr-environment
    shadow-intensity="1">

    <!-- 
      DIMENSION HOTSPOTS
      8 corner points of the bounding box + 3 label hotspots.
      The corner hotspots are invisible (used for SVG line endpoints).
      The label hotspots show the dimension text.
      
      Position values use model-space coordinates.
      You'll need to adjust these to match your phoenix.glb bounding box.
    -->

    <!-- ── INVISIBLE CORNER POINTS (for drawing SVG lines) ── -->
    <!-- Bottom-front-left -->
    <button slot="hotspot-dot+X-Y+Z" class="dim-hotspot" 
            data-position="0.225 0 0.30" data-normal="1 0 0"
            style="opacity:0; width:0; height:0; padding:0; border:0; overflow:hidden;">
    </button>
    <!-- Bottom-front-right -->
    <button slot="hotspot-dot-X-Y+Z" class="dim-hotspot"
            data-position="-0.225 0 0.30" data-normal="-1 0 0"
            style="opacity:0; width:0; height:0; padding:0; border:0; overflow:hidden;">
    </button>
    <!-- Top-front-left -->
    <button slot="hotspot-dot+X+Y+Z" class="dim-hotspot"
            data-position="0.225 0.375 0.30" data-normal="1 0 0"
            style="opacity:0; width:0; height:0; padding:0; border:0; overflow:hidden;">
    </button>
    <!-- Bottom-back-left -->
    <button slot="hotspot-dot+X-Y-Z" class="dim-hotspot"
            data-position="0.225 0 -0.30" data-normal="1 0 0"
            style="opacity:0; width:0; height:0; padding:0; border:0; overflow:hidden;">
    </button>

    <!-- ── VISIBLE DIMENSION LABELS ── -->
    <!-- WIDTH label (centered along bottom-front edge) -->
    <button slot="hotspot-dim-width" class="dim-hotspot"
            data-position="0 -0.01 0.30" data-normal="0 0 1">
      <span id="dim-width-label">45 cm</span>
    </button>
    
    <!-- HEIGHT label (centered along front-right edge) -->
    <button slot="hotspot-dim-height" class="dim-hotspot"
            data-position="0.24 0.19 0.30" data-normal="1 0 0">
      <span id="dim-height-label">75 cm</span>
    </button>

    <!-- DEPTH label (centered along bottom-right edge) -->
    <button slot="hotspot-dim-depth" class="dim-hotspot"
            data-position="0.24 -0.01 0" data-normal="0 0 1">
      <span id="dim-depth-label">60 cm</span>
    </button>

    <!-- SVG overlay for dimension lines (drawn via JS) -->
    <svg id="dimLines" class="dim-lines" xmlns="http://www.w3.org/2000/svg">
      <line id="line-width"></line>
      <line id="line-height"></line>
      <line id="line-depth"></line>
    </svg>

  </model-viewer>

  <!-- Gaussian Splat container (sits on top of model-viewer) -->
  <div id="splat-container"></div>

  <!-- Loading Overlay -->
  <div id="loadingOverlay">
    <div class="loader-wrap">
      <div class="loader-track"></div>
      <div class="loader-arc"></div>
      <div class="loader-dot"></div>
    </div>
    <span class="loader-label">Loading Scene</span>
    <div class="loader-bar-wrap"><div class="loader-bar-fill"></div></div>
  </div>

  <!-- Theme Toggle -->
  <button id="themeToggle" aria-label="Toggle theme">
    <svg id="iconMoon" width="16" height="16" viewBox="0 0 24 24" fill="none"
         stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/>
    </svg>
    <svg id="iconSun" width="16" height="16" viewBox="0 0 24 24" fill="none"
         stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <circle cx="12" cy="12" r="5"/>
      <line x1="12" y1="1" x2="12" y2="3"/><line x1="12" y1="21" x2="12" y2="23"/>
      <line x1="4.22" y1="4.22" x2="5.64" y2="5.64"/>
      <line x1="18.36" y1="18.36" x2="19.78" y2="19.78"/>
      <line x1="1" y1="12" x2="3" y2="12"/><line x1="21" y1="12" x2="23" y2="12"/>
      <line x1="4.22" y1="19.78" x2="5.64" y2="18.36"/>
      <line x1="18.36" y1="5.64" x2="19.78" y2="4.22"/>
    </svg>
  </button>

  <!-- Info Label -->
  <label id="infoLabel">
    <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor"
         stroke-width="1.7" stroke-linecap="round" stroke-linejoin="round">
      <path d="M18 11V6a2 2 0 0 0-2-2 2 2 0 0 0-2 2v4"/>
      <path d="M14 10V4a2 2 0 0 0-2-2 2 2 0 0 0-2 2v2"/>
      <path d="M10 10.5V6a2 2 0 0 0-2-2 2 2 0 0 0-2 2v8"/>
      <path d="M18 8a2 2 0 1 1 4 0v6a8 8 0 0 1-8 8h-2c-2.8 0-4.5-.86-5.99-2.34l-3.6-3.6a2 2 0 0 1 2.83-2.82L7 15"/>
    </svg>
    Swipe to Rotate
    <span class="dot-sep"></span>
    Pinch to Zoom
  </label>

  <!-- Bottom Panel -->
  <div id="bottomPanel">
    <button id="viewButton">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor"
           stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M21 16V8a2 2 0 0 0-1-1.73l-7-4a2 2 0 0 0-2 0l-7 4A2 2 0 0 0 3 8v8a2 2 0 0 0 1 1.73l7 4a2 2 0 0 0 2 0l7-4A2 2 0 0 0 21 16z"/>
        <polyline points="3.27 6.96 12 12.01 20.73 6.96"/>
        <line x1="12" y1="22.08" x2="12" y2="12"/>
      </svg>
      View in your Home
    </button>
  </div>


  <!-- ═══════════════════════════════════════════
       GAUSSIAN SPLAT VIEWER
       ═══════════════════════════════════════════ -->
  <script type="module">
    import * as GaussianSplats3D from '@mkkellogg/gaussian-splats-3d';

    function hideOverlay() {
      const ol = document.getElementById('loadingOverlay');
      if (ol) ol.classList.add('hidden');
    }
    const fallbackTimer = setTimeout(hideOverlay, 10000);

    try {
      const viewer = new GaussianSplats3D.Viewer({
        'cameraUp':                 [0.01896, -0.99955, -0.02341],
        'initialCameraPosition':    [-0.98641, -0.83035, -0.28385],
        'initialCameraLookAt':      [-0.00361, -0.20809, 0.02977],
        'sphericalHarmonicsDegree': 2,
        'selfDrivenMode':           true,
        'rootElement':              document.getElementById('splat-container')
      });
      viewer.start();
      if (viewer.controls) viewer.controls.rotateSpeed = 0.4;

      viewer.addSplatScene('assets/data/Phoenix_Royal_Yellow/Phoenix_Royal_Yellow.ply', {
        streamView: true,
        onProgress: (p) => {
          const f = document.querySelector('.loader-bar-fill');
          if (f) f.style.width = Math.min(p * 100, 95) + '%';
        }
      })
      .then(() => {
        clearTimeout(fallbackTimer);
        requestAnimationFrame(() => requestAnimationFrame(hideOverlay));
      })
      .catch((err) => { console.error('Splat load error:', err); clearTimeout(fallbackTimer); hideOverlay(); });
    } catch(e) {
      console.error('Viewer init error:', e); clearTimeout(fallbackTimer); hideOverlay();
    }
  </script>


  <!-- ═══════════════════════════════════════════
       AR + DIMENSIONS LOGIC
       
       This follows the official model-viewer "Show Dimensions"
       pattern from modelviewer.dev/examples/annotations.
       
       queryHotspot() returns screen-space coordinates of each
       hotspot. We use those to draw SVG lines connecting
       the bounding box corners, and position dimension labels.
       
       ⚠️  REQUIREMENTS FOR THIS TO WORK:
       1. Page served over HTTPS (WebXR requirement)
       2. model-viewer has real on-page dimensions (not 0×0)
       3. ar-modes="webxr" (not scene-viewer or quick-look)
       4. Chrome 83+ on Android with ARCore
       ═══════════════════════════════════════════ -->
  <script type="module">
    const mv = document.querySelector('#ar-model-viewer');
    const arButton = document.querySelector('#viewButton');

    // ── Draw SVG dimension lines using queryHotspot() ──
    // This is the official pattern from modelviewer.dev
    function drawLines() {
      // Query corner hotspots for screen-space positions
      const dotPlusXMinusYPlusZ  = mv.queryHotspot('hotspot-dot+X-Y+Z');
      const dotMinusXMinusYPlusZ = mv.queryHotspot('hotspot-dot-X-Y+Z');
      const dotPlusXPlusYPlusZ   = mv.queryHotspot('hotspot-dot+X+Y+Z');
      const dotPlusXMinusYMinusZ = mv.queryHotspot('hotspot-dot+X-Y-Z');

      // Width line: bottom-front-left → bottom-front-right
      const lineW = document.getElementById('line-width');
      if (dotPlusXMinusYPlusZ && dotMinusXMinusYPlusZ) {
        lineW.setAttribute('x1', dotPlusXMinusYPlusZ.canvasPosition.x);
        lineW.setAttribute('y1', dotPlusXMinusYPlusZ.canvasPosition.y);
        lineW.setAttribute('x2', dotMinusXMinusYPlusZ.canvasPosition.x);
        lineW.setAttribute('y2', dotMinusXMinusYPlusZ.canvasPosition.y);
      }

      // Height line: bottom-front-left → top-front-left
      const lineH = document.getElementById('line-height');
      if (dotPlusXMinusYPlusZ && dotPlusXPlusYPlusZ) {
        lineH.setAttribute('x1', dotPlusXMinusYPlusZ.canvasPosition.x);
        lineH.setAttribute('y1', dotPlusXMinusYPlusZ.canvasPosition.y);
        lineH.setAttribute('x2', dotPlusXPlusYPlusZ.canvasPosition.x);
        lineH.setAttribute('y2', dotPlusXPlusYPlusZ.canvasPosition.y);
      }

      // Depth line: bottom-front-left → bottom-back-left
      const lineD = document.getElementById('line-depth');
      if (dotPlusXMinusYPlusZ && dotPlusXMinusYMinusZ) {
        lineD.setAttribute('x1', dotPlusXMinusYPlusZ.canvasPosition.x);
        lineD.setAttribute('y1', dotPlusXMinusYPlusZ.canvasPosition.y);
        lineD.setAttribute('x2', dotPlusXMinusYMinusZ.canvasPosition.x);
        lineD.setAttribute('y2', dotPlusXMinusYMinusZ.canvasPosition.y);
      }
    }

    // ── Update dimension labels from model bounding box ──
    function updateDimensions() {
      try {
        const dims = mv.getDimensions();
        if (dims) {
          const w = (dims.x * 100).toFixed(0);
          const h = (dims.y * 100).toFixed(0);
          const d = (dims.z * 100).toFixed(0);

          const wEl = document.getElementById('dim-width-label');
          const hEl = document.getElementById('dim-height-label');
          const dEl = document.getElementById('dim-depth-label');

          if (wEl) wEl.textContent = w + ' cm';
          if (hEl) hEl.textContent = h + ' cm';
          if (dEl) dEl.textContent = d + ' cm';

          console.log(`📐 Model dimensions: ${w} × ${h} × ${d} cm`);
        }
      } catch (e) {
        console.log('Using default dimension values');
      }
    }

    // ── Redraw lines on camera change (works in WebXR AR too) ──
    mv.addEventListener('camera-change', drawLines);

    // ── When model loads ──
    mv.addEventListener('load', () => {
      console.log('✅ GLB model loaded');
      updateDimensions();
      drawLines();

      if (mv.canActivateAR) {
        arButton.style.display = 'flex';
        console.log('✅ WebXR AR available on this device');
      } else {
        console.warn('⚠️ WebXR AR not available — check: HTTPS? ARCore? Chrome Android?');
        arButton.style.display = 'flex'; // Still show button, let it fail gracefully
      }
    });

    // ── Custom AR button triggers WebXR ──
    arButton.addEventListener('click', () => {
      console.log('🚀 Attempting to start WebXR AR session...');
      try {
        mv.activateAR();
      } catch(e) {
        console.error('AR activation failed:', e);
        alert('AR is not available. Make sure you\'re on an ARCore-supported Android device using Chrome, and the page is served over HTTPS.');
      }
    });

    // ── AR session lifecycle ──
    mv.addEventListener('ar-status', (e) => {
      const status = e.detail?.status || '';
      console.log('📱 AR Status:', status);

      if (status === 'session-started') {
        console.log('✅ WebXR AR session is active');
        console.log('✅ Hotspots + dimension lines should be visible in AR');
        // In WebXR mode, model-viewer handles everything —
        // hotspots render as DOM inside the AR session automatically.
        // The camera-change event keeps firing, so drawLines() keeps updating.
        
        // Hide non-AR UI
        document.getElementById('splat-container').style.display = 'none';
        document.getElementById('themeToggle').style.display = 'none';
        document.getElementById('infoLabel').style.display = 'none';
        document.getElementById('bottomPanel').style.display = 'none';
      }

      if (status === 'not-presenting') {
        console.log('📱 AR session ended');
        // Restore UI
        document.getElementById('splat-container').style.display = 'block';
        document.getElementById('themeToggle').style.display = 'flex';
        document.getElementById('infoLabel').style.display = 'flex';
        document.getElementById('bottomPanel').style.display = 'flex';
      }
    });

    console.log('✅ AR + Dimensions system initialized');
    console.log('ℹ️  WebXR requires: HTTPS + Chrome Android + ARCore');
  </script>


  <!-- ═══ Theme Toggle ═══ -->
  <script>
    const toggleBtn = document.getElementById('themeToggle');
    const htmlEl    = document.documentElement;
    const saved     = localStorage.getItem('theme');
    if (saved) htmlEl.setAttribute('data-theme', saved);
    toggleBtn.addEventListener('click', () => {
      const next = htmlEl.getAttribute('data-theme') === 'dark' ? 'light' : 'dark';
      htmlEl.setAttribute('data-theme', next);
      localStorage.setItem('theme', next);
    });
  </script>

</body>
